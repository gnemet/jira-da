<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>JiraDa Architecture</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }

        body {
            background: #2a2a2a;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 40px;
        }

        #diagram {
            background: #2a2a2a;
            display: inline-block;
        }
    </style>
</head>

<body>
    <div id="diagram">
        <pre class="mermaid" id="mermaid-container"></pre>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
    <script>
        fetch('architecture_full.mmd')
            .then(r => r.text())
            .then(mmdContent => {
                document.getElementById('mermaid-container').textContent = mmdContent;

                mermaid.initialize({
                    startOnLoad: false,
                    theme: 'dark',
                    look: 'handDrawn',
                    fontFamily: 'sans-serif',
                    themeVariables: {
                        darkMode: true,
                        background: '#2a2a2a',
                        primaryColor: '#3a3a3a',
                        primaryTextColor: '#f0e6d3',
                        primaryBorderColor: '#888',
                        secondaryColor: '#333',
                        lineColor: '#ccc',
                        textColor: '#f0e6d3'
                    },
                    flowchart: {
                        curve: 'natural',
                        nodeSpacing: 40,
                        rankSpacing: 60,
                        padding: 15,
                        useMaxWidth: false,
                        htmlLabels: true
                    }
                });

                mermaid.run().then(() => {
                    document.title = 'READY';
                    console.log('READY');
                });
            });
    </script>
</body>

</html>
